name: CI

on:
  push:
  pull_request:

jobs:
  # ── Quality gate: lint + format + types + unit tests ──────
  # Runs on every push and PR. No external services required.

  quality:
    name: Lint, typecheck & unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ── E2e tests: auth flow against a real Supabase project ──
  # Skipped unless NEXT_PUBLIC_SUPABASE_URL is set as a
  # repository variable (Settings → Variables → Repository variables).
  #
  # Required configuration:
  #   Variables:  NEXT_PUBLIC_SUPABASE_URL
  #   Secrets:    NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
  #               SUPABASE_SECRET_KEY
  #
  # The Supabase project must have email confirmation DISABLED
  # (Auth → Email → "Confirm email" toggle off) so that signup
  # redirects immediately and the Playwright test can proceed.

  e2e:
    name: E2e tests (Playwright)
    needs: quality
    runs-on: ubuntu-latest
    if: ${{ vars.NEXT_PUBLIC_SUPABASE_URL != '' }}

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2e tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
